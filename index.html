<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class 12 Commerce JKBOSE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0b1120;
  color: #e5e7eb;
}

/* TOP BAR */
.header {
  text-align: center;
  padding: 18px;
  font-size: 14px;
  background: #020617;
  color: #22c55e;
  letter-spacing: 1px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 20px 30px;
}

.hero h1 {
  font-size: 42px;
  font-weight: 600;
}

.hero p {
  color: #94a3b8;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 30px;
  max-width: 900px;
  margin: auto;
}

/* CARD */
.card {
  background: #020617;
  border: 1px solid #1f2937;
  border-radius: 12px;
  padding: 25px;
  text-align: center;
  text-decoration: none;
  color: #e5e7eb;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
  border-color: #22c55e;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  font-size: 13px;
  color: #6b7280;
}
</style>
</head>

<body>

<div class="header">
  DEVELOPED BY MATEEN YOUSUF — TEACHER — SCHOOL EDUCATION DEPARTMENT J&K
</div>

<div class="hero">
  <h1>Class 12 Commerce</h1>
  <p>JKBOSE Digital Learning Hub</p>
</div>

<div class="container">

  <a class="card" href="Accountancy Class 12th/">💰 Accountancy</a>
  <a class="card" href="Business Studies Class 12th/">📊 Business Studies</a>
  <a class="card" href="Economics Class 12th/">📈 Economics</a>
  <a class="card" href="Entrepreneurship Class 12th/">🚀 Entrepreneurship</a>

</div>

<div class="footer">
  © 2026 • Smart Learning Platform
</div>

</body>
</html>
